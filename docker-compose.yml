services:
  postgres:
    image: postgres:16-alpine
    container_name: silkroad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: silkroad
      POSTGRES_PASSWORD: silkroad
      POSTGRES_DB: silkroad
    ports:
      - "5432:5432"
    volumes:
      - silkroad-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silkroad"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: silkroad-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - silkroad-redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  silkroad-pg:
  silkroad-redis:
