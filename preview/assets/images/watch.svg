<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1d2a6b"/>
      <stop offset="100%" stop-color="#0b1230"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d77f"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8942e"/>
    </linearGradient>
    <linearGradient id="bandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1d2a6b"/>
      <stop offset="100%" stop-color="#131c4a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <circle cx="200" cy="190" r="100" fill="url(#glow)"/>
  <g filter="url(#shadow)">
    <!-- Top band -->
    <path d="M172 80 L172 145 Q172 155 182 155 L218 155 Q228 155 228 145 L228 80" fill="url(#bandGrad)" stroke="url(#gold)" stroke-width="1.5" opacity="0.8"/>
    <!-- Band texture lines -->
    <line x1="180" y1="90" x2="220" y2="90" stroke="#d4af37" stroke-width="0.5" opacity="0.2"/>
    <line x1="180" y1="105" x2="220" y2="105" stroke="#d4af37" stroke-width="0.5" opacity="0.2"/>
    <line x1="180" y1="120" x2="220" y2="120" stroke="#d4af37" stroke-width="0.5" opacity="0.2"/>
    <!-- Bottom band -->
    <path d="M172 320 L172 255 Q172 245 182 245 L218 245 Q228 245 228 255 L228 320" fill="url(#bandGrad)" stroke="url(#gold)" stroke-width="1.5" opacity="0.8"/>
    <line x1="180" y1="280" x2="220" y2="280" stroke="#d4af37" stroke-width="0.5" opacity="0.2"/>
    <line x1="180" y1="295" x2="220" y2="295" stroke="#d4af37" stroke-width="0.5" opacity="0.2"/>
    <line x1="180" y1="310" x2="220" y2="310" stroke="#d4af37" stroke-width="0.5" opacity="0.2"/>
    <!-- Watch case -->
    <rect x="155" y="145" width="90" height="110" rx="20" fill="#131c4a" stroke="url(#gold)" stroke-width="2.5"/>
    <!-- Crown button -->
    <rect x="248" y="185" width="12" height="20" rx="3" fill="#1d2a6b" stroke="url(#gold)" stroke-width="1.5"/>
    <!-- Screen -->
    <rect x="168" y="158" width="64" height="84" rx="12" fill="#070b1c" stroke="#d4af37" stroke-width="0.8" opacity="0.7"/>
    <!-- Clock face -->
    <circle cx="200" cy="190" r="24" fill="none" stroke="#d4af37" stroke-width="0.8" opacity="0.5"/>
    <!-- Hour hand -->
    <line x1="200" y1="190" x2="200" y2="172" stroke="#e6c25a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Minute hand -->
    <line x1="200" y1="190" x2="214" y2="183" stroke="#f0d77f" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="200" cy="190" r="2.5" fill="#d4af37"/>
    <!-- Time display -->
    <text x="200" y="228" text-anchor="middle" fill="#e6c25a" font-family="Inter,monospace" font-size="10" font-weight="600" opacity="0.8">10:42</text>
    <!-- Heart rate icon -->
    <text x="200" y="215" text-anchor="middle" fill="#ef4444" font-family="Inter,system-ui" font-size="8" opacity="0.6">&#9829; 72</text>
  </g>
  <!-- Decorative -->
  <circle cx="70" cy="330" r="2.5" fill="#d4af37" opacity="0.25"/>
  <circle cx="330" cy="320" r="2" fill="#d4af37" opacity="0.2"/>
  <text x="200" y="355" text-anchor="middle" fill="#e6c25a" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" opacity="0.7">SPORT FIT</text>
  <text x="200" y="375" text-anchor="middle" fill="#f5f1e8" font-family="Inter,system-ui,sans-serif" font-size="11" opacity="0.4">Smart Watch</text>
</svg>
