<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0b1230"/>
      <stop offset="60%" stop-color="#131c4a"/>
      <stop offset="100%" stop-color="#1d2a6b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0d77f"/>
      <stop offset="100%" stop-color="#d4af37"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#131c4a"/>
      <stop offset="100%" stop-color="#070b1c"/>
    </linearGradient>
    <linearGradient id="containerRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="containerBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="containerGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8942e"/>
    </linearGradient>
    <linearGradient id="containerGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="containerGray" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4b5563"/>
      <stop offset="100%" stop-color="#374151"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Sky -->
  <rect width="1200" height="400" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="100" cy="40" r="1" fill="#f5f1e8" opacity="0.4"/>
  <circle cx="250" cy="25" r="1.2" fill="#f5f1e8" opacity="0.3"/>
  <circle cx="400" cy="50" r="0.8" fill="#f5f1e8" opacity="0.5"/>
  <circle cx="600" cy="30" r="1" fill="#f5f1e8" opacity="0.35"/>
  <circle cx="800" cy="45" r="1.3" fill="#f5f1e8" opacity="0.3"/>
  <circle cx="950" cy="20" r="0.9" fill="#f5f1e8" opacity="0.45"/>
  <circle cx="1100" cy="55" r="1" fill="#f5f1e8" opacity="0.3"/>
  <!-- Distant crane silhouettes -->
  <g opacity="0.15" fill="#d4af37">
    <rect x="80" y="60" width="4" height="200"/>
    <rect x="60" y="70" width="60" height="4"/>
    <rect x="60" y="70" width="4" height="30"/>
    <rect x="900" y="50" width="4" height="210"/>
    <rect x="870" y="60" width="70" height="4"/>
    <rect x="870" y="60" width="4" height="35"/>
    <rect x="1050" y="80" width="4" height="180"/>
    <rect x="1025" y="90" width="55" height="4"/>
  </g>
  <!-- Ground plane -->
  <rect x="0" y="260" width="1200" height="140" fill="url(#ground)"/>
  <!-- Ground line -->
  <line x1="0" y1="260" x2="1200" y2="260" stroke="#d4af37" stroke-width="1" opacity="0.2"/>
  <!-- Container stacks with shadows -->
  <g filter="url(#shadow)">
    <!-- Stack 1 (left) — 2 high -->
    <rect x="50" y="170" width="160" height="90" rx="3" fill="url(#containerRed)" stroke="#000" stroke-width="1" opacity="0.9"/>
    <line x1="80" y1="170" x2="80" y2="260" stroke="#000" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="170" x2="140" y2="260" stroke="#000" stroke-width="0.5" opacity="0.3"/>
    <rect x="50" y="80" width="160" height="90" rx="3" fill="url(#containerBlue)" stroke="#000" stroke-width="1" opacity="0.85"/>
    <line x1="80" y1="80" x2="80" y2="170" stroke="#000" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="80" x2="140" y2="170" stroke="#000" stroke-width="0.5" opacity="0.3"/>
    <!-- Stack 2 -->
    <rect x="230" y="170" width="160" height="90" rx="3" fill="url(#containerGold)" stroke="#000" stroke-width="1" opacity="0.9"/>
    <line x1="260" y1="170" x2="260" y2="260" stroke="#000" stroke-width="0.5" opacity="0.3"/>
    <line x1="320" y1="170" x2="320" y2="260" stroke="#000" stroke-width="0.5" opacity="0.3"/>
    <rect x="230" y="80" width="160" height="90" rx="3" fill="url(#containerGreen)" stroke="#000" stroke-width="1" opacity="0.85"/>
    <rect x="230" y="-10" width="160" height="90" rx="3" fill="url(#containerRed)" stroke="#000" stroke-width="1" opacity="0.7"/>
    <!-- Stack 3 -->
    <rect x="410" y="170" width="160" height="90" rx="3" fill="url(#containerGray)" stroke="#000" stroke-width="1" opacity="0.9"/>
    <line x1="440" y1="170" x2="440" y2="260" stroke="#000" stroke-width="0.5" opacity="0.3"/>
    <line x1="500" y1="170" x2="500" y2="260" stroke="#000" stroke-width="0.5" opacity="0.3"/>
    <rect x="410" y="80" width="160" height="90" rx="3" fill="url(#containerBlue)" stroke="#000" stroke-width="1" opacity="0.85"/>
    <!-- Stack 4 -->
    <rect x="590" y="170" width="160" height="90" rx="3" fill="url(#containerGreen)" stroke="#000" stroke-width="1" opacity="0.9"/>
    <rect x="590" y="80" width="160" height="90" rx="3" fill="url(#containerGold)" stroke="#000" stroke-width="1" opacity="0.85"/>
    <rect x="590" y="-10" width="160" height="90" rx="3" fill="url(#containerGray)" stroke="#000" stroke-width="1" opacity="0.7"/>
    <!-- Stack 5 -->
    <rect x="770" y="170" width="160" height="90" rx="3" fill="url(#containerRed)" stroke="#000" stroke-width="1" opacity="0.9"/>
    <line x1="800" y1="170" x2="800" y2="260" stroke="#000" stroke-width="0.5" opacity="0.3"/>
    <line x1="860" y1="170" x2="860" y2="260" stroke="#000" stroke-width="0.5" opacity="0.3"/>
    <rect x="770" y="80" width="160" height="90" rx="3" fill="url(#containerGold)" stroke="#000" stroke-width="1" opacity="0.85"/>
    <!-- Stack 6 -->
    <rect x="950" y="170" width="160" height="90" rx="3" fill="url(#containerBlue)" stroke="#000" stroke-width="1" opacity="0.9"/>
    <rect x="950" y="80" width="160" height="90" rx="3" fill="url(#containerGreen)" stroke="#000" stroke-width="1" opacity="0.85"/>
  </g>
  <!-- Golden glow overlay at bottom -->
  <rect x="0" y="300" width="1200" height="100" fill="url(#ground)" opacity="0.8"/>
  <!-- SilkRoad route line -->
  <path d="M0 340 Q300 310 600 335 Q900 360 1200 330" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.3" stroke-dasharray="8 6"/>
  <!-- Labels on some containers -->
  <text x="310" y="220" text-anchor="middle" fill="#070b1c" font-family="Inter,system-ui" font-size="14" font-weight="800" opacity="0.5">SILK ROAD</text>
  <text x="670" y="130" text-anchor="middle" fill="#f5f1e8" font-family="Inter,system-ui" font-size="10" font-weight="600" opacity="0.3">CN → IR</text>
</svg>
